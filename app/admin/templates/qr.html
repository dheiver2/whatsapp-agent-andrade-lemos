{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">QR Code</h1>
<p class="text-slate-400 text-sm mb-4">Página pública pra cliente escanear:</p>
<div class="bg-slate-900 rounded-xl p-4 border border-slate-800 mb-4">
  <a href="{{ qr_url }}" target="_blank" class="text-blue-400 hover:underline font-mono">{{ qr_url }}</a>
</div>
<iframe src="{{ qr_url }}" class="w-full bg-white rounded-xl" style="height:700px;"></iframe>
{% endblock %}
